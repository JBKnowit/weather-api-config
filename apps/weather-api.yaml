apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: weather-api
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  source:
    repoURL: https://github.com/JBKnowit/weather-api-config.git
    targetRevision: HEAD
    path: env/dev/weatherapi
  destination:
    server: https://kubernetes.default.svc
    namespace: weatherapi
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
