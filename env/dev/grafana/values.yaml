# Grafana Helm values
# Chart: grafana v8.8.2
# Docs: https://github.com/grafana/helm-charts/tree/main/charts/grafana
#
# These values override the chart defaults.
# Run `helm show values grafana/grafana` to see all available options.

service:
  type: LoadBalancer
  port: 3000

persistence:
  enabled: true
  size: 1Gi

# Default admin credentials (change in production!)
adminUser: admin
adminPassword: admin

# Datasources — automatically configure Prometheus
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus-server.monitoring.svc:80
        isDefault: true
      - name: Loki
        type: loki
        uid: loki
        url: http://loki.monitoring.svc:3100
        access: proxy
        jsonData:
          httpMethod: GET
        isDefault: false
      - name: Tempo
        type: tempo
        url: http://tempo.monitoring.svc.cluster.local:3200
        isDefault: false

# Dashboard providers tell Grafana where provisioned dashboards should appear.
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: Kubernetes
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

# Dashboards can be pulled from Grafana.com by gnetId/revision.
dashboards:
  default:
    kubernetes-cluster:
      gnetId: 15661
      revision: 1
      datasource: Prometheus
    node-exporter-full:
      gnetId: 1860
      revision: 37
      datasource: Prometheus

# Load dashboard JSON files from labeled ConfigMaps (managed as plain YAML in this repo).
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    searchNamespace: monitoring