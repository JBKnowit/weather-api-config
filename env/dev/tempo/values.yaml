# Grafana Tempo Helm values for monolith mode
# Chart: tempo
# Docs: https://grafana.github.io/helm-charts/

serviceAccount:
  create: true
  name: tempo

service:
  type: ClusterIP
  port: 3100

tempo:
  authEnabled: false
  
  # Monolith configuration: single instance with all components
  config: |
    server:
      http_listen_port: 3100
      log_level: info

    distributor:
      rate_limit_bytes: 5000000
      rate_limit_enabled: false

    ingester:
      trace_idle_period: 10s
      max_block_bytes: 5242880
      processors:
        batch:
          timeout: 10s
          send_batch_size: 1024

    compactor:
      compaction:
        block_retention: 1h
        compacted_block_retention: 10m
        max_compaction_objects: 6000000
        max_time_per_tenant: 5m
        v2_out_buffer_meg: 20

    storage:
      trace:
        backend: local
        wal:
          path: /var/tempo/wal
        local:
          path: /var/tempo/traces

    querier:
      max_concurrent_requests: 10
      search:
        prefer_self: 10
        default_result_limit: 20

    query_frontend:
      compression: snappy

persistence:
  enabled: true
  size: 5Gi

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Disable multi-tenancy 
multitenancy_enabled: false

# Single pod replicas for monolith
replicas: 1
