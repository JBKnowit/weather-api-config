# Grafana Tempo Helm values for monolith mode
# Chart: tempo
# Docs: https://grafana.github.io/helm-charts/

serviceAccount:
  create: true

service:
  type: ClusterIP
  port: 3100

# Monolith deployment mode
deploymentMode: monolith

# Minimal config for single-node dev
config: |
  server:
    http_listen_port: 3100
    log_level: info

  distributor:
    rate_limit_bytes: 5000000

  ingester:
    trace_idle_period: 10s
    max_block_bytes: 5242880

  compactor:
    compaction:
      block_retention: 1h
      compacted_block_retention: 10m

  storage:
    trace:
      backend: local
      wal:
        path: /var/tempo/wal
      local:
        path: /var/tempo/traces

# Persistence for trace storage
persistence:
  enabled: true
  size: 5Gi
  storageClassName: null

# Single replica for monolith
replicas: 1

# Resource requests for single-node
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
