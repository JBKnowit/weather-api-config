replicas: 1
metricsGenerator:
  enabled: true
  config:
    ring:
      kvstore:
        store: memberlist
    registry:
      external_labels:
        source: tempo
        cluster: docker-compose
    storage:
      path: /var/tempo/generator/wal
      remote_write:
        - url: http://prometheus-server.monitoring.svc.cluster.local:80/api/v1/write
          send_exemplars: true
    traces_storage:
      path: /var/tempo/generator/traces
    processor:
      local_blocks:
        filter_server_spans: false
        flush_to_storage: true
overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics, local-blocks]
      generate_native_histograms: both
tempo:
  memberlist:
    abort_if_cluster_join_fails: false
    join_members:
      - tempo-gossip-ring.monitoring.svc.cluster.local:7946
  resources:
    requests:
      memory: 2Gi
    limits:
      memory: 4Gi
  retention: 24h
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces